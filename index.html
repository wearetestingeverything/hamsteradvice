<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamster Care Companion V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffdae9;
            --dark-pink: #ff85a2;
            --soft-yellow: #fff5ba;
            --text-color: #5a4a42;
        }
 
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--primary-pink);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }
 
        .container {
            background: white;
            max-width: 550px;
            width: 100%;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
 
        h1 { text-align: center; color: var(--dark-pink); }
        .hamster-icon { font-size: 50px; text-align: center; display: block; }
 
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-group { flex: 1; margin-bottom: 15px; }
        
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--primary-pink);
            border-radius: 12px;
            box-sizing: border-box;
        }
 
        button {
            width: 100%;
            background-color: var(--dark-pink);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
 
        #results {
            margin-top: 25px;
            padding: 20px;
            border-radius: 20px;
            background-color: var(--soft-yellow);
            display: none;
        }
 
        .warning { color: #d93025; font-weight: bold; }
        .success { color: #188038; font-weight: bold; }
    </style>
</head>
<body>
 
<div class="container">
    <span class="hamster-icon">🐹</span>
    <h1>Hamster Helper V2</h1>
    
    <div class="form-group">
        <label for="species">Dwarf Species</label>
        <select id="species">
            <option value="hybrid">Hybrid / Winter White / Campbell's</option>
            <option value="roborovski">Roborovski</option>
            <option value="chinese">Chinese Dwarf</option>
        </select>
    </div>
 
    <div class="form-group">
        <label for="age">Age (Months)</label>
        <input type="number" id="age" min="1" placeholder="e.g. 8">
    </div>
 
    <label>Enclosure Dimensions (cm)</label>
    <div class="form-row">
        <input type="number" id="length" placeholder="Length">
        <input type="number" id="width" placeholder="Width">
        <input type="number" id="height" placeholder="Height">
    </div>
 
    <button onclick="calculateCare()">Evaluate Care! ✨</button>
 
    <div id="results">
        <div id="areaDisplay" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 15px;"></div>
        <div id="housingFeedback"></div>
        <hr>
        <div id="dietFeedback"></div>
    </div>
</div>
 
<script>
    function calculateCare() {
        const length = parseFloat(document.getElementById('length').value);
        const width = parseFloat(document.getElementById('width').value);
        const height = parseFloat(document.getElementById('height').value);
        const species = document.getElementById('species').value;
        const area = length * width;
 
        if (!length || !width || !height) {
            alert("Please enter all dimensions!");
            return;
        }
 
        const resDiv = document.getElementById('results');
        const areaDisp = document.getElementById('areaDisplay');
        const houseFeed = document.getElementById('housingFeedback');
        const dietFeed = document.getElementById('dietFeedback');
 
        areaDisp.innerText = `Total Floor Area: ${area.toLocaleString()} cm²`;
 
        // Housing Logic (Standard: 5,000 cm²)
        if (area < 5000) {
            houseFeed.innerHTML = `<span class="warning">⚠️ Too Small!</span> Your enclosure is below the 5,000 cm² minimum. Small cages cause stress and bar-biting.`;
        } else {
            houseFeed.innerHTML = `<span class="success">✅ Good Size!</span> Your enclosure meets artgerecht standards. Ensure at least 20cm of bedding for burrowing.`;
        }
 
        // Height check for bedding
        if (height < 50) {
            houseFeed.innerHTML += `<br><i>Note: A height of 50cm+ is recommended to fit deep bedding and a large wheel.</i>`;
        }
 
        // Diet Logic
        let diet = "<b>Nutrition Tips:</b><ul>";
        diet += "<li><b>NO sugar/fruit:</b> Dwarf hamsters are highly diabetes-prone. Avoid fruit, corn, and honey.</li>";
        diet += "<li><b>Protein:</b> They need insects like dried mealworms or crickets (1-2 times a week).</li>";
        diet += "<li><b>Fresh Food:</b> Stick to green vegetables (cucumber, zucchini, broccoli). No carrots or bell peppers (too much sugar).</li>";
        diet += "<li><b>Water:</b> Use a small ceramic bowl instead of a bottle to prevent neck strain.</li>";
        diet += "</ul>";
        
        dietFeed.innerHTML = diet;
        resDiv.style.display = 'block';
    }
</script>
 
</body>
</html>
