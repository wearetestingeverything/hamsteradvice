<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamster Care Expert V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffdae9;
            --dark-pink: #ff85a2;
            --soft-yellow: #fff5ba;
            --text-color: #5a4a42;
            --success-green: #4caf50;
            --error-red: #f44336;
            --warning-orange: #ff9800;
        }
 
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--primary-pink);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }
 
        .container {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
 
        h1 { text-align: center; color: var(--dark-pink); margin-top: 0; }
        h2 { font-size: 1.1rem; border-bottom: 2px solid var(--primary-pink); padding-bottom: 5px; margin-top: 20px; }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.9rem; }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--primary-pink);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }
 
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .checkbox-group input { width: auto; }
 
        button {
            width: 100%;
            background-color: var(--dark-pink);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }
 
        button:hover { background-color: #ff6b8e; transform: translateY(-2px); }
 
        #results {
            margin-top: 25px;
            padding: 25px;
            border-radius: 20px;
            background-color: var(--soft-yellow);
            display: none;
            border: 3px solid white;
        }
 
        .report-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .warning-item { color: var(--error-red); font-weight: 600; margin-bottom: 5px; }
        .success-item { color: var(--success-green); font-weight: 600; margin-bottom: 5px; }
        
        ul { padding-left: 20px; }
        li { margin-bottom: 8px; }
    </style>
</head>
<body>
 
<div class="container">
    <h1>🐹 Hamster Care Expert</h1>
    
    <div class="form-group">
        <label for="species">Species</label>
        <select id="species">
            <option value="dwarf_hybrid">Dwarf Hybrid (Diabetes prone)</option>
            <option value="roborovski">Roborovski (Sand lover)</option>
            <option value="chinese">Chinese Dwarf (Climber)</option>
        </select>
    </div>
 
    <h2>📏 Enclosure Size (cm)</h2>
    <div style="display: flex; gap: 10px;">
        <div class="form-group"><label>Length</label><input type="number" id="length" placeholder="100"></div>
        <div class="form-group"><label>Width</label><input type="number" id="width" placeholder="50"></div>
        <div class="form-group"><label>Height</label><input type="number" id="height" placeholder="50"></div>
    </div>
 
    <h2>🎡 Equipment & Habitat</h2>
    <div class="form-group">
        <label for="wheel">Wheel Diameter (cm)</label>
        <input type="number" id="wheel" placeholder="e.g. 25">
    </div>
    <div class="form-group">
        <label for="bedding">Bedding Depth (cm)</label>
        <input type="number" id="bedding" placeholder="e.g. 20">
    </div>
    <div class="checkbox-group">
        <input type="checkbox" id="sand">
        <label for="sand">I have a Sand Bath with Chinchilla Sand</label>
    </div>
    <div class="checkbox-group">
        <input type="checkbox" id="house">
        <label for="house">I have a Multi-Chamber House</label>
    </div>
 
    <button onclick="evaluateCare()">Analyze My Habitat ✨</button>
 
    <div id="results">
        <h2 style="text-align: center; margin-top: 0;">Evaluation Report</h2>
        <div id="statusReport" class="report-card"></div>
        <div id="nutritionTips" class="report-card"></div>
        <div id="habitatTips" class="report-card"></div>
    </div>
</div>
 
<script>
    function evaluateCare() {
        const L = parseFloat(document.getElementById('length').value);
        const W = parseFloat(document.getElementById('width').value);
        const H = parseFloat(document.getElementById('height').value);
        const wheel = parseFloat(document.getElementById('wheel').value);
        const bedding = parseFloat(document.getElementById('bedding').value);
        const hasSand = document.getElementById('sand').checked;
        const hasHouse = document.getElementById('house').checked;
        const species = document.getElementById('species').value;
 
        if (!L || !W || !H || !wheel || !bedding) {
            alert("Please fill in all measurements!");
            return;
        }
 
        const area = L * W;
        let score = 0;
        let reportHTML = "";
 
        // Area Check
        if (area >= 5000) {
            reportHTML += "<div class='success-item'>✅ Great floor space (" + area + " cm²).</div>";
            score++;
        } else {
            reportHTML += "<div class='warning-item'>❌ Space too small! Need at least 5,000 cm².</div>";
        }
 
        // Wheel Check
        if (wheel >= 25) {
            reportHTML += "<div class='success-item'>✅ Proper wheel size for a straight back.</div>";
            score++;
        } else {
            reportHTML += "<div class='warning-item'>❌ Wheel too small! Min. 25cm to prevent spinal injury.</div>";
        }
 
        // Bedding Check
        if (bedding >= 20) {
            reportHTML += "<div class='success-item'>✅ Deep bedding for burrowing.</div>";
            score++;
        } else {
            reportHTML += "<div class='warning-item'>❌ Not enough bedding. Min 20cm needed for tunnels.</div>";
        }
 
        // Sand & House
        if (hasSand) { score++; reportHTML += "<div class='success-item'>✅ Sand bath provided.</div>"; }
        else { reportHTML += "<div class='warning-item'>❌ Sand bath missing (needed for fur hygiene).</div>"; }
 
        if (hasHouse) { score++; reportHTML += "<div class='success-item'>✅ Multi-chamber house provided.</div>"; }
        else { reportHTML += "<div class='warning-item'>❌ Multi-chamber house missing (natural behavior).</div>"; }
 
        // Final Status Display
        document.getElementById('statusReport').innerHTML = `<b>Score: ${score}/5</b><br>${reportHTML}`;
 
        // Nutrition (Based on TVT/Hamsterhilfe standards)
        let nutr = "<b>Expert Nutrition Tips:</b><ul>";
        if (species === 'dwarf_hybrid' || species === 'chinese') {
            nutr += "<li><b style='color:red'>NO FRUIT:</b> Extremely high diabetes risk. No sugar, no honey, no fruit.</li>";
            nutr += "<li><b>Safe Veggies:</b> Cucumber, zucchini, sprouts, broccoli. No carrots or corn.</li>";
        } else {
            nutr += "<li><b>Roborovski Tip:</b> They need more small seeds (millets) and approx. 1/3 sand area in the cage.</li>";
        }
        nutr += "<li><b>Insects:</b> 2-3 times a week (Mehlwürmer or Gammarus) for protein.</li>";
        nutr += "</ul>";
        document.getElementById('nutritionTips').innerHTML = nutr;
 
        // Habitat Tips
        let tips = "<b>Vital Safety Tips:</b><ul>";
        tips += "<li><b>Fall Height:</b> Max 10-15 cm. They have poor depth perception!</li>";
        tips += "<li><b>Water:</b> Use a small bowl. Bottles often get stuck or cause bad neck angles.</li>";
        tips += "<li><b>Scatter Feeding:</b> Hide food in the bedding to keep them busy!</li>";
        tips += "</ul>";
        document.getElementById('habitatTips').innerHTML = tips;
 
        document.getElementById('results').style.display = 'block';
    }
</script>
 
</body>
</html>
